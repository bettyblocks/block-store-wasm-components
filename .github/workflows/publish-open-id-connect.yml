on:
  push:
    branches: ["main"]
    paths:
      - "components/open-id-connect/**"

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/open-id-connect

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-wasip2
          cache-directories: components/open-id-connect/target
          cache-all-crates: "true"

      - uses: cargo-bins/cargo-binstall@main

      - name: Install wash
        run: cargo binstall wash-cli --no-confirm

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from wasmcloud.toml
        id: version
        working-directory: components/open-id-connect
        run: |
          VERSION=$(grep '^version' wasmcloud.toml | head -1 | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build component
        working-directory: components/open-id-connect
        run: wash build

      - name: Push to GHCR
        working-directory: components/open-id-connect
        run: |
          wash push \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} \
            ./build/open_id_connect_s.wasm
